openapi: 3.0.0
info:
  title: API Scalar Documentation
  version: 1.0.0
paths:
  /api/scalar:
    post:
      summary: Process a scalar value
      description: |
        This endpoint processes a scalar value (int, float, string) according to the specific requirements of the API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                  description: A scalar value (int, float, string) to be processed by the API.
      responses:
        '200':
          description: Successfully processed the scalar value
          content:
            application/json:
              schema:
                type: string
                description: The processed scalar value after applying the necessary transformations.
        '400':
          description: Invalid input, the value must be a scalar type
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error message